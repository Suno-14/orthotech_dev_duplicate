name: C++ CI
on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      # LINUX

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          PACKAGES=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['packages']))
          ")
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      - name: Build and Install ur_rtde from Source (Linux)
        if: runner.os == 'Linux'
        run: |
          SOURCE_DEPS=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['source']))
          ")
          if echo "$SOURCE_DEPS" | grep -q "ur_rtde"; then
            git clone https://gitlab.com/sdurobotics/ur_rtde.git
            cd ur_rtde
            git submodule update --init --recursive
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release -DPYTHON_BINDINGS:BOOL=OFF
            make -j$(nproc)
            sudo make install
            sudo ldconfig
          fi

      - name: Configure Project (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build

      # WINDOWS

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: cache-vcpkg
        with:
          path: vcpkg/installed
          key: vcpkg-${{ hashFiles('windows-requirements.json') }}
          restore-keys: |
            vcpkg-

      - name: Install vcpkg Dependencies (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $packages = python -c @"
          import json
          with open('windows-requirements.json') as f:
              d = json.load(f)
          print(' '.join(f'{p}:x64-windows' for p in d['vcpkg']))
          "@
          Invoke-Expression ".\vcpkg\vcpkg.exe install $packages"

      - name: Cache ur_rtde install (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: cache-ur-rtde
        with:
          path: C:\ur_rtde_install
          key: ur-rtde-x64-windows-${{ hashFiles('windows-requirements.json') }}
          restore-keys: |
            ur-rtde-x64-windows-

      - name: Build and Install ur_rtde from Source (Windows)
        if: runner.os == 'Windows' && steps.cache-ur-rtde.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sourceDeps = python -c @"
          import json
          with open('windows-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['source']))
          "@
          if ($sourceDeps -match 'ur_rtde') {
            git clone https://gitlab.com/sdurobotics/ur_rtde.git
            cd ur_rtde
            git submodule update --init --recursive
            mkdir build
            cd build
            cmake .. `
              -DCMAKE_BUILD_TYPE=Release `
              -DPYTHON_BINDINGS:BOOL=OFF `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
              -DVCPKG_TARGET_TRIPLET=x64-windows `
              -DCMAKE_INSTALL_PREFIX="C:\ur_rtde_install"
            cmake --build . --config Release
            cmake --install . --config Release
          }
      - name: Verify Boost CMake config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "${{ github.workspace }}\vcpkg\installed\x64-windows" -Filter "BoostConfig.cmake"

      - name: Configure Project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="C:\ur_rtde_install"

      # BUILD & RUN

      - name: Build Project
        run: cmake --build build --config Release

      - name: List Build Files (Linux)
        if: runner.os == 'Linux'
        run: find build -type f

      - name: List Build Files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Recurse build

      - name: Run Executable (Linux)
        if: runner.os == 'Linux'
        run: ./build/main

      - name: Run Executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\Release\main.exe
