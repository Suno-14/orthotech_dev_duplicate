name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      - name: Install Linux system packages
        run: |
          PACKAGES=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['packages']))
          ")
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      # ── Rust (required to compile zenoh-c which is written in Rust) ──────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── zenoh: version-locked install ─────────────────────────────────────
      # Strategy: clone zenoh-cpp first, read zenoh-c-branch.txt to find
      # the exact zenoh-c ref it was built against, then build zenoh-c at
      # that ref. This guarantees zero version clashes.

      - name: Cache zenoh build
        uses: actions/cache@v4
        with:
          path: |
            ~/third_party
            ~/.cargo/registry
            ~/.cargo/git
          key: zenoh-linux-${{ hashFiles('config/dependencies.yml') }}
          restore-keys: |
            zenoh-linux-

      - name: Clone zenoh-cpp and read required zenoh-c ref
        run: |
          mkdir -p ~/third_party
          cd ~/third_party
          if [ ! -d zenoh-cpp ]; then
            git clone https://github.com/eclipse-zenoh/zenoh-cpp.git
          fi
          cd zenoh-cpp
          git fetch --tags
          git checkout 1.3.4
          ZENOHC_REF=$(cat zenoh-c-branch.txt)
          echo "zenoh-cpp 1.3.4 requires zenoh-c ref: $ZENOHC_REF"
          echo "ZENOHC_REF=$ZENOHC_REF" >> $GITHUB_ENV

      - name: Clone and build zenoh-c at matching ref
        run: |
          cd ~/third_party
          if [ ! -d zenoh-c ]; then
            git clone https://github.com/eclipse-zenoh/zenoh-c.git
          fi
          cd zenoh-c
          git fetch --tags origin
          git checkout ${{ env.ZENOHC_REF }}
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build . -j$(nproc)
          sudo cmake --build . --target install
          sudo ldconfig

      - name: Build and install zenoh-cpp
        run: |
          cd ~/third_party/zenoh-cpp
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DZENOHCXX_ZENOHC=ON \
            -DZENOHCXX_ZENOHPICO=OFF \
            -DZENOHCXX_ENABLE_TESTS=OFF \
            -DZENOHCXX_ENABLE_EXAMPLES=OFF \
            -DZENOHCXX_EXAMPLES_PROTOBUF=OFF
          cmake --build . -j$(nproc)
          sudo cmake --build . --target install
          sudo ldconfig

      - name: Verify zenoh headers installed
        run: |
          ls /usr/local/lib/cmake/zenohc/
          ls /usr/local/lib/cmake/zenohcxx/
          ls /usr/local/include/zenoh/api/session.hxx

      # ── ur_rtde ───────────────────────────────────────────────────────────
      - name: Build and install ur_rtde
        run: |
          SOURCE_DEPS=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['source']))
          ")
          if echo "$SOURCE_DEPS" | grep -q "ur_rtde"; then
            git clone https://gitlab.com/sdurobotics/ur_rtde.git
            cd ur_rtde
            git submodule update --init --recursive
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release -DPYTHON_BINDINGS:BOOL=OFF
            make -j$(nproc)
            sudo make install
            sudo ldconfig
          fi

      # ── Project build ─────────────────────────────────────────────────────
      - name: Configure project
        run: |
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build -j$(nproc)

      - name: List build outputs
        run: find build -type f -executable

      # ── Zenoh pub/sub test ────────────────────────────────────────────────
      - name: Run zenoh pub/sub test
        run: |
          ./build/zenoh_sub > /tmp/sub_output.txt 2>&1 &
          SUB_PID=$!
          sleep 2
          timeout 5 ./build/zenoh_pub || true
          sleep 2
          kill $SUB_PID || true
          echo "=== Subscriber output ==="
          cat /tmp/sub_output.txt
          grep -q "Received" /tmp/sub_output.txt && \
            echo "TEST PASSED" || \
            (echo "TEST FAILED: no messages received" && exit 1)

      # ── Existing main executable ──────────────────────────────────────────
      - name: Run main executable
        run: ./build/main