name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Requirements
        run: python scripts/generate_requirements.py

      # ── System packages ───────────────────────────────────────────────────
      - name: Install Linux system packages
        run: |
          PACKAGES=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['packages']))
          ")
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      # ── Rust (required to compile zenoh-c which is written in Rust) ───────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── zenoh: both pinned to 1.3.4 — guaranteed compatible ──────────────
      # Rule: zenoh-c tag X.Y.Z is always compatible with zenoh-cpp tag X.Y.Z.
      # Never use 'main' as a ref — it moves and breaks reproducibility.

      - name: Cache zenoh build
        uses: actions/cache@v4
        with:
          path: |
            ~/third_party
            ~/.cargo/registry
            ~/.cargo/git
          key: zenoh-linux-1.3.4-${{ runner.os }}
          restore-keys: |
            zenoh-linux-1.3.4-

      - name: Clone zenoh-cpp at pinned tag
        run: |
          mkdir -p ~/third_party
          cd ~/third_party
          if [ ! -d zenoh-cpp ]; then
            git clone https://github.com/eclipse-zenoh/zenoh-cpp.git
          fi
          cd zenoh-cpp
          git fetch --tags
          git checkout 1.3.4

      - name: Clone and build zenoh-c at matching pinned tag
        run: |
          cd ~/third_party
          if [ ! -d zenoh-c ]; then
            git clone https://github.com/eclipse-zenoh/zenoh-c.git
          fi
          cd zenoh-c
          git fetch --tags
          git checkout 1.3.4
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build . -j$(nproc)
          sudo cmake --build . --target install
          sudo ldconfig

      - name: Build and install zenoh-cpp
        run: |
          cd ~/third_party/zenoh-cpp
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DZENOHCXX_ZENOHC=ON \
            -DZENOHCXX_ZENOHPICO=OFF \
            -DZENOHCXX_ENABLE_TESTS=OFF \
            -DZENOHCXX_ENABLE_EXAMPLES=OFF \
            -DZENOHCXX_EXAMPLES_PROTOBUF=OFF
          cmake --build . -j$(nproc)
          sudo cmake --build . --target install
          sudo ldconfig

      - name: Verify zenoh headers installed
        run: |
          ls /usr/local/lib/cmake/zenohc/
          ls /usr/local/lib/cmake/zenohcxx/
          ls /usr/local/include/zenoh/api/session.hxx

      # ── ur_rtde ───────────────────────────────────────────────────────────
      - name: Build and install ur_rtde
        run: |
          SOURCE_DEPS=$(python3 -c "
          import json
          with open('linux-requirements.json') as f:
              d = json.load(f)
          print(' '.join(d['source']))
          ")
          if echo "$SOURCE_DEPS" | grep -q "ur_rtde"; then
            git clone https://gitlab.com/sdurobotics/ur_rtde.git
            cd ur_rtde
            git submodule update --init --recursive
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release -DPYTHON_BINDINGS:BOOL=OFF
            make -j$(nproc)
            sudo make install
            sudo ldconfig
          fi

      # ── Project build ─────────────────────────────────────────────────────
      - name: Configure project
        run: |
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH=/usr/local \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build -j$(nproc)

      - name: List build outputs
        run: find build -type f -executable

      # ── Zenoh pub/sub test ────────────────────────────────────────────────
      - name: Run zenoh pub/sub test
        run: |
          # Start subscriber in background, capture output
          ./build/zenoh_sub > /tmp/sub_output.txt 2>&1 &
          SUB_PID=$!

          # Give subscriber time to initialize and discover peers
          sleep 2

          # Run publisher for 5 seconds (sends 5 messages at 1Hz)
          timeout 5 ./build/zenoh_pub || true

          # Give subscriber time to receive the last message
          sleep 2

          # Tear down subscriber
          kill $SUB_PID || true

          echo "=== Subscriber output ==="
          cat /tmp/sub_output.txt

          grep -q "Received" /tmp/sub_output.txt && \
            echo "TEST PASSED: subscriber received messages" || \
            (echo "TEST FAILED: no messages received" && exit 1)

      # ── Existing main executable ──────────────────────────────────────────
      - name: Run main executable
        run: ./build/main
