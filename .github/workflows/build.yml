# ==============================================================================
# .github/workflows/build.yml
# Triggers on every push to every branch + all pull requests
# Manual trigger allows selectively running Linux, Windows, or both
# ==============================================================================

name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      enable_linux:
        description: 'Run Linux build'
        required: true
        type: boolean
        default: true
      enable_windows:
        description: 'Run Windows build'
        required: true
        type: boolean
        default: true
env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8 # Restricts 'cmake --build' to a maximum of 8 cores
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NINJA_STATUS: "[%f/%t %e] "

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Linux Server Build Pipeline
  # ----------------------------------------------------------------------------
  build-linux:
    name: Build — Linux
    runs-on: [self-hosted, linux, orthotech]
    if: |
      github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' && inputs.enable_linux == true)
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run Unified Toolchain Build & Test
        run: |
            python3 -m venv build_env
            source build_env/bin/activate
            python3 scripts/setup_all.py --skip-prereqs --skip-pull
   
      - name: Upload Linux Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Windows Server Build Pipeline
  # ----------------------------------------------------------------------------
  build-windows:
    name: Build — Windows
    runs-on: [self-hosted, windows, orthotech]
    if: |
      github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' && inputs.enable_windows == true)
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          submodules: false

      # BOOTSTRAP: Forces the runner to look inside your exact Python 3.11 directories
      - name: Bootstrap Environment Paths
        shell: cmd
        run: |
          if exist "%USERPROFILE%\AppData\Local\Programs\Python\Python311\" (
            echo %USERPROFILE%\AppData\Local\Programs\Python\Python311\>> %GITHUB_PATH%
            echo %USERPROFILE%\AppData\Local\Programs\Python\Python311\Scripts\>> %GITHUB_PATH%
          ) else (
            echo "C:\Program Files\Python311\">> %GITHUB_PATH%
            echo "C:\Program Files\Python311\Scripts\">> %GITHUB_PATH%
          )

      # UNIFIED PIPELINE: Calls your setup toolchain completely using pwsh
      - name: Run Unified Toolchain Build & Test
        shell: pwsh
        run: |
          python scripts/setup_all.py --skip-prereqs --skip-pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: build/
          retention-days: 7