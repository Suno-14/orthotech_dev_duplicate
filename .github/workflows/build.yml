# ==============================================================================
# .github/workflows/build.yml
# Triggers on every push to every branch + all pull requests
# Manual trigger allows selectively running Linux, Windows, or both
# ==============================================================================

name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      enable_linux:
        description: 'Run Linux build'
        required: true
        type: boolean
        default: true
      enable_windows:
        description: 'Run Windows build'
        required: true
        type: boolean
        default: false
env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8 # Restricts 'cmake --build' to a maximum of 8 cores
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NINJA_STATUS: "[%f/%t %e] "

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Linux Server Build Pipeline
  # ----------------------------------------------------------------------------
  build-linux:
    name: Build — Linux
    # runs-on: [self-hosted, linux, orthotech]
    runs-on: ubuntu-latest
    timeout-minutes: 60     
    if: |
      github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' && inputs.enable_linux == true)
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run Unified Toolchain Build & Test
        env:
            # THE GOLD STANDARD: Forwards the host machine's system SSH keys automatically
            SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
        run: |
            if [ -f "$HOME/.ssh/id_ed25519" ]; then
              KEY_PATH="$HOME/.ssh/id_ed25519"
            else
              KEY_PATH="$HOME/.ssh/id_rsa"
            fi
            
            # Direct Git to pass this specific private key file to GitHub
            export GIT_SSH_COMMAND="ssh -i $KEY_PATH"

            python3 -m venv build_env
            source build_env/bin/activate
      - name: Install CI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev \
            ninja-build \
            libssl-dev \
            libeigen3-dev \
            libcurl4-openssl-dev
          
          python3 scripts/setup_all.py 
   
      - name: Upload Linux Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/
          retention-days: 7

